<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell — your AI chat</title>
<style>
  :root{
    --ink: #1b2430;
    --paper: #eef1f6;
    --paper-2: #ffffff;
    --line: #c9d2de;
    --accent: #2f5d62;
    --accent-soft: #d9e6e4;
    --user-bubble: #1b2430;
    --user-text: #f4f6f9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--paper);
    font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  header{
    padding:18px 24px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    background:var(--paper-2);
  }
  .brand{
    font-size:1.3rem;
    letter-spacing:0.02em;
    font-weight:600;
  }
  .brand small{
    display:block;
    font-family: -apple-system, system-ui, sans-serif;
    font-size:0.68rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#6b7686;
    margin-top:2px;
  }
  #status{
    font-family: -apple-system, system-ui, sans-serif;
    font-size:0.72rem;
    color:#6b7686;
  }
  #chat{
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:18px;
    max-width:760px;
    margin:0 auto;
    width:100%;
  }
  .row{display:flex;}
  .row.user{justify-content:flex-end;}
  .bubble{
    max-width:78%;
    padding:12px 16px;
    border-radius:14px;
    line-height:1.55;
    font-size:0.98rem;
    white-space:pre-wrap;
  }
  .row.user .bubble{
    background:var(--user-bubble);
    color:var(--user-text);
    border-radius:16px 16px 4px 16px;
  }
  .row.assistant .bubble{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:16px 16px 16px 4px;
  }
  .row.assistant .bubble.thinking{
    color:#6b7686;
    font-style:italic;
  }
  .dots span{
    display:inline-block;
    width:5px;height:5px;
    margin-right:3px;
    border-radius:50%;
    background:var(--accent);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2){animation-delay:0.15s;}
  .dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes pulse{
    0%,80%,100%{opacity:0.25; transform:scale(0.8);}
    40%{opacity:1; transform:scale(1);}
  }
  #empty{
    margin:auto;
    text-align:center;
    color:#7c879a;
    max-width:420px;
  }
  #empty h2{
    font-size:1.4rem;
    color:var(--ink);
    margin-bottom:6px;
  }
  footer{
    border-top:1px solid var(--line);
    background:var(--paper-2);
    padding:14px 24px 18px;
  }
  #form{
    max-width:760px;
    margin:0 auto;
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  #input{
    flex:1;
    resize:none;
    font-family: -apple-system, system-ui, sans-serif;
    font-size:0.96rem;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--paper);
    color:var(--ink);
    max-height:140px;
  }
  #input:focus{
    outline:2px solid var(--accent-soft);
    outline-offset:1px;
    border-color:var(--accent);
  }
  #send{
    font-family: -apple-system, system-ui, sans-serif;
    font-weight:600;
    font-size:0.9rem;
    background:var(--accent);
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
  }
  #send:disabled{
    background:#9fb2b1;
    cursor:not-allowed;
  }
  #send:focus-visible, #input:focus-visible{
    outline:2px solid var(--accent);
  }
  .hint{
    text-align:center;
    font-family: -apple-system, system-ui, sans-serif;
    font-size:0.7rem;
    color:#9aa3b2;
    margin-top:8px;
  }
  @media (prefers-reduced-motion: reduce){
    .dots span{animation:none; opacity:0.7;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">Inkwell<small>a small, honest chat assistant</small></div>
  <div id="status">ready</div>
</header>

<div id="chat">
  <div id="empty">
    <h2>Write the first line.</h2>
    <p>Ask anything. Inkwell remembers this conversation until you close the tab.</p>
  </div>
</div>

<footer>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Message Inkwell…" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>
  <div class="hint">Inkwell can make mistakes. Check important facts.</div>
</footer>

<script>
const chat = document.getElementById('chat');
const empty = document.getElementById('empty');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');

let history = [];

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});

function addBubble(role, text){
  if(empty.parentNode) empty.remove();
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addThinking(){
  if(empty.parentNode) empty.remove();
  const row = document.createElement('div');
  row.className = 'row assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble thinking';
  bubble.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

async function sendMessage(text){
  history.push({ role: 'user', content: text });
  addBubble('user', text);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  statusEl.textContent = 'thinking…';

  const thinkingBubble = addThinking();

  try{
    // Talks to OUR OWN backend (/api/chat), not the AI provider directly.
    // Our backend holds the secret key safely.
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error || 'Request failed');
    }

    const replyText = data.reply || '(no response)';

    thinkingBubble.parentNode.remove();
    addBubble('assistant', replyText);
    history.push({ role: 'assistant', content: replyText });
    statusEl.textContent = 'ready';
  }catch(err){
    thinkingBubble.parentNode.remove();
    addBubble('assistant', "Something went wrong reaching the model. Please try again in a moment.");
    statusEl.textContent = 'error';
    console.error(err);
  }finally{
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if(!text) return;
  sendMessage(text);
});
</script>

</body>
</html>
